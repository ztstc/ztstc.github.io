<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ztstc's Wiki</title>

  <script>
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <link rel="stylesheet" href="assets/css/fonts.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/tabs.css">
  <link rel="stylesheet" href="assets/css/notes.css">
  <link rel="stylesheet" href="assets/css/extras.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <!-- KaTeX（数学公式）-->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <!-- highlight.js（代码高亮）主题：github 风格 -->
  <link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github.min.css">
</head>
<body>
  <nav>
    <div class="container nav-container">
      <a href="#" class="logo">
        <span class="logo-text">ztstc</span>
        <div class="logo-dot"></div>
      </a>

      <div class="nav-actions">
        <div class="nav-controls">
          <button class="control-btn lang-toggle" aria-label="Toggle Language">中文</button>
          <button class="control-btn theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-sun sun-icon"></i>
            <i class="fas fa-moon moon-icon"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Tab 栏 -->
  <div class="tab-bar" role="tablist" aria-label="主导航">
    <div class="tab-bar-inner">
      <button class="tab-btn active" data-tab="home" role="tab" aria-selected="true" type="button">
        <!-- <span class="tab-icon">🏠</span> -->
        <span class="tab-label" data-i18n="tabs.home">首页</span>
      </button>
      <button class="tab-btn" data-tab="projects" role="tab" aria-selected="false" type="button">
        <!-- <span class="tab-icon">🚀</span> -->
        <span class="tab-label" data-i18n="tabs.projects">项目</span>
      </button>
      <button class="tab-btn" data-tab="notes" role="tab" aria-selected="false" type="button">
        <!-- <span class="tab-icon">📚</span> -->
        <span class="tab-label" data-i18n="tabs.notes">笔记</span>
      </button>
    </div>
  </div>

  <main>
    <!-- Tab 1: Home -->
    <div class="tab-panel active" data-panel="home" role="tabpanel">
      <section id="intro" class="intro">
        <div class="bg-decoration"></div>
        <div class="container flex-center column">
          <div class="avatar-container">
            <img src="assets/images/Avatar.jpg" alt="Avatar" class="avatar" data-i18n="intro.avatarAlt">
            <div class="avatar-glow"></div>
          </div>
          <h1 class="gradient-text" data-i18n="intro.title">Hello, I'm ztstc</h1>
          <p class="subtitle" data-i18n="intro.desc">...</p>
          <div class="intro-contact-links" aria-label="Social Links"></div>
        </div>
      </section>

      <section id="opensource" class="section-padding">
        <div class="container">
          <h2 data-i18n="opensource.title">Open Source Contributions</h2>
          <div class="opensource-grid"></div>
        </div>
      </section>

      <section id="timeline" class="section-padding">
        <div class="container">
          <h2 data-i18n="timeline.title">Timeline</h2>
          <div class="timeline-container"></div>
        </div>
      </section>

      <section id="skills" class="section-padding">
        <div class="container">
          <h2 data-i18n="skills.title">Tech Stack</h2>
          <div class="skills-wrapper"></div>
        </div>
      </section>
    </div>

    <!-- Tab 2: Projects -->
    <div class="tab-panel" data-panel="projects" role="tabpanel">
      <section class="section-padding">
        <div class="container">
          <h2 data-i18n="projects.title">My Projects</h2>
          <div class="projects-grid"></div>
        </div>
      </section>
    </div>

    <!-- Tab 3: Notes Wiki -->
    <div class="tab-panel" data-panel="notes" role="tabpanel">
      <div class="notes-layout">
        <aside class="notes-sidebar" aria-label="Notes sidebar"></aside>
        <article class="notes-viewer" aria-label="Notes viewer">
          <div class="notes-viewer-empty">
            <div class="notes-viewer-empty-icon">📚</div>
            <div class="notes-viewer-empty-text" style="font-size:1.1rem;font-weight:600;color:var(--text-main);" data-i18n="notes.welcomeTitle">欢迎来到笔记 Wiki</div>
            <div class="notes-viewer-empty-text" data-i18n="notes.welcomeText">从左侧选择一篇笔记开始阅读</div>
          </div>
        </article>
      </div>
    </div>
  </main>

  <footer data-i18n="footer.copyright">© 2026 ztstc. All rights reserved.</footer>

  <script src="assets/vendor/marked.min.js" defer></script>
  <!-- KaTeX + highlight.js（必须在 notes.js 之前加载完成）-->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/tabs.js"></script>
  <script src="assets/js/notes.js"></script>
</body>
</html>
